name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x86_64
          - target: aarch64-apple-darwin
            arch: aarch64

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Get version
        id: version
        run: echo "version=$(cargo metadata --format-version=1 --no-deps | python3 -c 'import sys,json; print(json.load(sys.stdin)["packages"][0]["version"])')" >> "$GITHUB_OUTPUT"

      - name: Create .pkg installer
        run: |
          mkdir -p pkg-root/usr/local/bin
          cp target/${{ matrix.target }}/release/music-gate-away pkg-root/usr/local/bin/
          chmod +x pkg-root/usr/local/bin/music-gate-away
          pkgbuild \
            --root pkg-root \
            --identifier com.musicgateaway.app \
            --version ${{ steps.version.outputs.version }} \
            --install-location / \
            MusicGateAway-${{ steps.version.outputs.version }}-macOS-${{ matrix.arch }}.pkg

      - name: Create portable archive
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/music-gate-away dist/
          cd dist && tar czf ../MusicGateAway-${{ steps.version.outputs.version }}-macOS-${{ matrix.arch }}.tar.gz music-gate-away

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            MusicGateAway-*.pkg
            MusicGateAway-*.tar.gz

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $meta = cargo metadata --format-version=1 --no-deps | ConvertFrom-Json
          $ver = $meta.packages[0].version
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Create Setup installer
        shell: pwsh
        run: |
          $binDir = "${{ github.workspace }}\target\x86_64-pc-windows-msvc\release"
          iscc /DMyAppVersion="${{ steps.version.outputs.version }}" /DBinDir="$binDir" installer\windows.iss

      - name: Create portable archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\x86_64-pc-windows-msvc\release\music-gate-away.exe dist\
          cd dist; 7z a ..\MusicGateAway-${{ steps.version.outputs.version }}-Windows-x86_64.zip music-gate-away.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            MusicGateAway-*-Setup-*.exe
            MusicGateAway-*.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
